<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Streaming Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem 1rem;
    }

    .chat-wrapper {
      width: 100%;
      max-width: 700px;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    h1 {
      font-size: 1.2rem;
      color: #333;
      margin-bottom: 1rem;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .message {
      max-width: 85%;
      padding: 0.65rem 0.9rem;
      border-radius: 10px;
      line-height: 1.6;
      font-size: 0.93rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .user      { background: #0070f3; color: white; align-self: flex-end; }
    .assistant { background: #f1f1f1; color: #111;   align-self: flex-start; }

    .input-row {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.75rem;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      padding: 0.7rem;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 0.93rem;
      font-family: inherit;
      resize: none;
      height: 52px;
      overflow-y: auto;
    }

    button {
      padding: 0.65rem 1.2rem;
      border: none;
      border-radius: 8px;
      font-size: 0.93rem;
      cursor: pointer;
      white-space: nowrap;
    }

    #send          { background: #0070f3; color: white; }
    #send:disabled { background: #aaa; cursor: not-allowed; }
    #clear         { background: #f1f1f1; color: #555; }

    .status {
      font-size: 0.78rem;
      color: #aaa;
      margin-top: 0.3rem;
      min-height: 1rem;
    }
  </style>
</head>
<body>
  <div class="chat-wrapper">
    <h1>AI Chat</h1>
    <div id="messages"></div>
    <p class="status" id="status"></p>
    <div class="input-row">
      <textarea id="input" placeholder="Ask something... (Ctrl+Enter to send)"></textarea>
      <button id="send">Send</button>
      <button id="clear">New Chat</button>
    </div>
  </div>

  <script>
    let sessionId = null;

    // Create a session on load; store the ID for every subsequent request
    async function initSession() {
      const res  = await fetch('/session', { method: 'POST' });
      const data = await res.json();
      sessionId  = data.sessionId;
    }

    function appendMessage(role, text) {
      const div = document.createElement('div');
      div.className = `message ${role}`;
      div.textContent = text;
      document.getElementById('messages').appendChild(div);
      div.scrollIntoView({ behavior: 'smooth' });
      return div;
    }

    document.getElementById('send').addEventListener('click', async () => {
      const input   = document.getElementById('input');
      const message = input.value.trim();
      if (!message || !sessionId) return;

      const sendBtn = document.getElementById('send');
      const status  = document.getElementById('status');

      input.value      = '';
      sendBtn.disabled = true;
      status.textContent = 'Generating...';

      appendMessage('user', message);
      const assistantBubble = appendMessage('assistant', '');

      try {
        const response = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, sessionId }),
        });

        if (!response.ok) {
          const err = await response.json();
          assistantBubble.textContent = `Error: ${err.error}`;
          return;
        }

        const reader  = response.body.getReader();
        const decoder = new TextDecoder();

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;

          const lines = decoder.decode(value, { stream: true }).split('\n');

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;

            try {
              const data = JSON.parse(line.slice(6));

              if (data.done)  { break; }
              if (data.error) {
                assistantBubble.textContent += `\n[Error: ${data.error}]`;
                break;
              }
              if (data.token) {
                assistantBubble.textContent += data.token;
                assistantBubble.scrollIntoView({ behavior: 'smooth' });
              }
            } catch {
              // An SSE event can be split across two network chunks.
              // The JSON.parse will throw on the incomplete fragment.
              // Catching it here lets the next read deliver the rest.
            }
          }
        }

        status.textContent = '';
      } catch (err) {
        assistantBubble.textContent = `Request failed: ${err.message}`;
        status.textContent = '';
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    });

    // Delete the session server-side, create a fresh one, clear the UI
    document.getElementById('clear').addEventListener('click', async () => {
      if (!sessionId) return;
      await fetch(`/session/${sessionId}`, { method: 'DELETE' });
      await initSession();
      document.getElementById('messages').innerHTML = '';
      document.getElementById('status').textContent = '';
    });

    // Ctrl+Enter to send
    document.getElementById('input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && e.ctrlKey) document.getElementById('send').click();
    });

    initSession();
  </script>
</body>
</html>
