<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Streaming Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      padding: 2rem 1rem;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 680px;
    }

    h1 {
      font-size: 1.4rem;
      color: #111;
      margin-bottom: 1.5rem;
    }

    textarea {
      width: 100%;
      height: 90px;
      padding: 0.75rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 0.95rem;
      resize: vertical;
      font-family: inherit;
    }

    button {
      margin-top: 0.6rem;
      padding: 0.6rem 1.4rem;
      background: #0070f3;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      cursor: pointer;
    }

    button:disabled {
      background: #aaa;
      cursor: not-allowed;
    }

    #response {
      margin-top: 1.5rem;
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 1rem 1.2rem;
      min-height: 120px;
      white-space: pre-wrap;
      line-height: 1.6;
      font-size: 0.95rem;
      color: #222;
    }

    #status {
      font-size: 0.8rem;
      color: #888;
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Real-Time AI Chat</h1>
    <textarea id="input" placeholder="Ask something..."></textarea>
    <br>
    <button id="send">Send</button>
    <p id="status"></p>
    <div id="response"></div>
  </div>

  <script>
    const sendBtn = document.getElementById('send');
    const input = document.getElementById('input');
    const output = document.getElementById('response');
    const status = document.getElementById('status');

    sendBtn.addEventListener('click', async () => {
      const message = input.value.trim();
      if (!message) return;

      sendBtn.disabled = true;
      output.textContent = '';
      status.textContent = 'Generating...';

      try {
        const response = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message }),
        });

        if (!response.ok) {
          const err = await response.json();
          output.textContent = `Error: ${err.error}`;
          return;
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;

          const text = decoder.decode(value, { stream: true });
          const lines = text.split('\n');

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;

            try {
              const data = JSON.parse(line.slice(6));

              if (data.error) {
                output.textContent += `\n[Error: ${data.error}]`;
                break;
              }

              if (data.done) break;

              if (data.token) {
                output.textContent += data.token;
              }
            } catch {
              // Incomplete JSON chunk — skip and continue
            }
          }
        }

        status.textContent = 'Done.';
      } catch (err) {
        output.textContent = `Request failed: ${err.message}`;
        status.textContent = '';
      } finally {
        sendBtn.disabled = false;
      }
    });

    // Allow Ctrl+Enter to submit
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && e.ctrlKey) sendBtn.click();
    });
  </script>
</body>
</html>
